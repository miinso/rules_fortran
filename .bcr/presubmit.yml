matrix:
  platform:
    - ubuntu2404
    - ubuntu2404_arm64
    - debian13
    - fedora43
    - macos
    - macos_arm64
    - windows
  bazel: [7.x, 8.x]
tasks:
  unit_tests:
    name: "Unit tests"
    platform: ${{ platform }}
    bazel: ${{ bazel }}
    test_targets:
      - "//test/..."
bcr_test_module:
  module_path: "examples"
  matrix:
    platform:
      - ubuntu2404
      - ubuntu2404_arm64
      - debian13
      - fedora43
      - macos
      - macos_arm64
      - windows
    bazel: [7.x, 8.x]
  tasks:
    run_examples:
      name: "Run examples"
      platform: ${{ platform }}
      bazel: ${{ bazel }}
      test_targets:
        - "//basic:all"
        - "//blas:all"
        - "//omp:all"
    run_wasm_tests:
      name: "Run wasm tests"
      platform: ubuntu2404
      bazel: 8.x
      test_targets:
        - "//wasm:hello_wasm_test"
        - "//wasm:full_wasm_test"
        - "//wasm:omp_hello_wasm_test"
      test_flags:
        - --config=wasm
